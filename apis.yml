aid: jdbc
name: JDBC
description: >-
  JDBC (Java Database Connectivity) is a Java API that defines how a client
  may access a database. It provides methods for querying and updating data
  in a database and is oriented towards relational databases. JDBC is part
  of the Java Standard Edition platform via the java.sql module (with
  enterprise extensions in javax.sql), and every JDBC driver implements the
  Driver interface to enable database connectivity in Java applications.
